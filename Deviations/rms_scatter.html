    };

    const samples   = ["TS01","TS02","TS03","TS04","TS05","TS06"];
    const materials = Object.keys(raw);   // ["PLA","PLA-CF","PLA-GF","PETG","PETG-CF","ABS"]

    const palette = [
      [0.22, 0.63, 0.29],
      [0.12, 0.47, 0.71],
      [0.60, 0.31, 0.64],
      [1.00, 0.50, 0.05],
      [0.89, 0.10, 0.11],
      [0.40, 0.40, 0.40],
    ];
    const markerTypes = ["circle","rect","triangle","rectRot","crossRot","star"];

    function rgb(c, a=1) {
      return `rgba(${Math.round(c[0]*255)},${Math.round(c[1]*255)},${Math.round(c[2]*255)},${a})`;
    }

    // x = material index, y = RMS value; one line per sample
    const datasets = samples.map((ts, i) => ({
      label: ts,
      data: materials.map((mat, xi) => ({ x: xi, y: raw[mat][ts] ?? null })),
      borderColor: rgb(palette[i]),
      backgroundColor: rgb(palette[i]),
      pointStyle: markerTypes[i],
      pointRadius: 6,
      pointHoverRadius: 8,
      borderWidth: 1.5,
      tension: 0,
      spanGaps: false,
    }));

    const ctx = document.getElementById("chart").getContext("2d");
    const chart = new Chart(ctx, {
      type: "line",
      data: { datasets },
      options: {
        responsive: false,
        animation: false,
        plugins: {
          legend: {
            display: true,
            position: "right",
            labels: {
              font: { family: "'Times New Roman', Times, serif", size: 11 },
              color: "#000",
              usePointStyle: true,
              pointStyleWidth: 12,
              padding: 10,
            }
          },
          title: {
            display: true,
            text: "RMS deviation  (mm)",
            font: { family: "'Times New Roman', Times, serif", size: 14, weight: "bold" },
            color: "#000",
            padding: { bottom: 8 }
          },
          tooltip: {
            backgroundColor: "#fff",
            borderColor: "#999",
            borderWidth: 1,
            titleColor: "#000",
            bodyColor: "#333",
            titleFont: { family: "'Times New Roman', Times, serif" },
            bodyFont:  { family: "'Times New Roman', Times, serif" },
            callbacks: {
              title: items => `${materials[Math.round(items[0].parsed.x)]} — ${items[0].dataset.label}`,
              label: item => `RMS: ${item.parsed.y !== null ? item.parsed.y.toFixed(4) : "N/A"} mm`,
            }
          }
        },
        scales: {
          x: {
            type: "linear",
            min: -0.5,
            max: materials.length - 0.5,
            ticks: {
              color: "#000",
              font: { family: "'Times New Roman', Times, serif", size: 10 },
              stepSize: 1,
              callback: (v) => materials[Math.round(v)] ?? "",
            },
            grid: { color: "#ddd", lineWidth: 0.8 },
            border: { color: "#000" },
          },
          y: {
            beginAtZero: true,
            ticks: {
              color: "#000",
              font: { family: "'Times New Roman', Times, serif", size: 10 },
              callback: v => v.toFixed(2),
            },
            grid: { color: "#ddd", lineWidth: 0.8 },
            border: { color: "#000" },
            title: {
              display: true,
              text: "mm",
              color: "#000",
              font: { family: "'Times New Roman', Times, serif", size: 11 },
            }
          }
        }
      }
    });

    // Place thumbnails aligned with y-axis tick positions
    setTimeout(() => {
      const ca       = chart.chartArea;
      const cvs      = document.getElementById("chart");
      const scaleY   = cvs.offsetHeight / cvs.height;

      const plotTop    = ca.top    * scaleY;
      const plotBottom = ca.bottom * scaleY;
      const plotHeight = plotBottom - plotTop;
      const rowH       = plotHeight / samples.length;

      // Set top/bottom spacers
      document.getElementById("thumbSpacerTop").style.height = plotTop + "px";
      document.getElementById("thumbSpacerBot").style.height = (cvs.offsetHeight - plotBottom) + "px";

      const col = document.getElementById("thumbCol");
      // Insert items before the bottom spacer
      const botSpacer = document.getElementById("thumbSpacerBot");

      samples.forEach((ts, i) => {
        const item = document.createElement("div");
        item.className = "thumb-item";
        item.style.height = rowH + "px";

        if (images[ts]) {
          const img = document.createElement("img");
          img.src = images[ts];
          item.appendChild(img);
        }

        const lbl = document.createElement("div");
        lbl.className = "ts-label";
        lbl.textContent = ts;
        item.appendChild(lbl);

        col.insertBefore(item, botSpacer);
      });
    }, 200);
